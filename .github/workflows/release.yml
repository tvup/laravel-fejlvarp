name: Release

# Tag-driven release pipeline.
#
# Maintainer flow:
#   1. Add a new section to CHANGELOG.md under `## vX.Y.Z - YYYY-MM-DD`
#   2. Commit + push to master
#   3. git tag vX.Y.Z && git push --tags
#   4. This workflow creates the matching GitHub Release using the
#      CHANGELOG section as the release body. Packagist auto-updates
#      via the installed GitHub App webhook.
#
# Pre-releases (tag contains a hyphen, e.g. v1.2.3-rc1) are flagged
# automatically.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract changelog section for tag
        id: changelog
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          body=$(awk -v version="$version" '
            /^## / {
              if (printing) exit
              if ($0 ~ "^## " version "( |$)") printing = 1
              next
            }
            printing
          ' CHANGELOG.md)

          if [ -z "$(echo "$body" | tr -d "[:space:]")" ]; then
            echo "::warning::No CHANGELOG section found for tag $version. Release will be created with an empty body."
          fi

          {
            echo 'body<<CHANGELOG_EOF'
            echo "$body"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          prerelease: ${{ contains(github.ref_name, '-') }}
