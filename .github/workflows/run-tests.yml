name: run-tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
        stability: [prefer-lowest, prefer-stable]
        php-laravel-testbench:
          - {php: 8.3, laravel: 11.*, testbench: 9.*}
          - {php: 8.4, laravel: 11.*, testbench: 9.*}
          - {php: 8.3, laravel: 12.*, testbench: 10.*}
          - {php: 8.4, laravel: 12.*, testbench: 10.*}
          - {php: 8.3, laravel: 13.*, testbench: 11.*}
          - {php: 8.4, laravel: 13.*, testbench: 11.*}
          - {php: 8.5, laravel: 13.*, testbench: 11.*}

    name: PHP ${{ matrix.php-laravel-testbench.php }} - Laravel ${{ matrix.php-laravel-testbench.laravel }} - Testbench ${{ matrix.php-laravel-testbench.testbench }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-laravel-testbench.php }}
          extensions: mbstring, pcntl, pdo, sqlite, pdo_sqlite, gd, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.php-laravel-testbench.laravel }}" --no-update
          if ($LASTEXITCODE -ne 0) { Write-Error 'Installing Laravel framework failed'; exit 1 }
          composer require "orchestra/testbench:${{ matrix.php-laravel-testbench.testbench }}" --dev --no-update
          if ($LASTEXITCODE -ne 0) { Write-Error 'Installing Orchestra Testbench failed'; exit 1 }
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction
          if ($LASTEXITCODE -ne 0) { Write-Error 'Composer update failed'; exit 1 }
        shell: pwsh

      - name: Execute tests
        run: vendor/bin/pest
